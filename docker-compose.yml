version: '3.9'

# ============================================================
# AgentX — Docker Compose
# Full stack: backend + frontend + redis
# Supabase is external (cloud-hosted)
# ============================================================

networks:
  agentx-net:
    driver: bridge

volumes:
  redis-data:
  repo-cache:

services:
  # ── Redis (job queue + pub/sub) ─────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [agentx-net]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Backend (FastAPI) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    networks: [agentx-net]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DOCKER_NETWORK=agentx-net
    volumes:
      - repo-cache:/tmp/agentx_repos
      - /var/run/docker.sock:/var/run/docker.sock  # for Docker-in-Docker verification
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Frontend (Next.js) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    restart: unless-stopped
    networks: [agentx-net]
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
